name: Update signals

on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 hours at :15
  workflow_dispatch: {}
  push:
    branches:
      - main
      - claude/optimistic-franklin-7W0UB
    paths:
      - "scripts/fetch_signals.py"
      - ".github/workflows/update-signals.yml"

permissions:
  contents: write

concurrency:
  group: update-signals-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch signals
        run: python scripts/fetch_signals.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update signals $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
